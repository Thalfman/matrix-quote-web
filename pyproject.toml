[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]  # FastAPI depends pattern uses function calls as defaults

[tool.ruff.lint.per-file-ignores]
"backend/app/routes/*.py" = ["B008"]
"tests/*.py" = ["B018"]
